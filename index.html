<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>BX 프로모션 스케줄러</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#F5F6F8}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,textarea{background:#fff;border:1px solid #E5E7EB;color:#1A1D23;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#2563EB}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
var _sbClient = null;
var SB_DEFAULT_URL = "https://ayprudyppqmdodmufapc.supabase.co";
var SB_DEFAULT_KEY = "sb_publishable_PeTv04Qtc0NECThCAKcz9g_AzrBIP0G";
function getSB() {
  if (_sbClient) return _sbClient;
  try {
    var cfg = JSON.parse(localStorage.getItem("bx-sb-cfg") || "{}");
    var url = cfg.url || SB_DEFAULT_URL;
    var key = cfg.key || SB_DEFAULT_KEY;
    if (url && key) { _sbClient = supabase.createClient(url, key); return _sbClient; }
  } catch(e) {}
  return null;
}
function cloudLoad() {
  var sb = getSB();
  if (!sb) return Promise.resolve(null);
  return sb.from("scheduler").select("data").eq("id", 1).single().then(function(res) {
    if (res.data && res.data.data) return res.data.data; return null;
  }).catch(function() { return null; });
}
function cloudSave(data) {
  var sb = getSB();
  if (!sb) return Promise.resolve();
  return sb.from("scheduler").upsert({ id: 1, data: data, updated_at: new Date().toISOString() }).then(function() {}).catch(function() {});
}


const GRADES = {
  S: { md: 5, color: "#DC2626" },
  A: { md: 4, color: "#EA580C" },
  B: { md: 3, color: "#CA8A04" },
  C: { md: 2, color: "#16A34A" },
  D: { md: 1, color: "#2563EB" },
  E: { md: 1, color: "#9333EA" },
};

const DN = ["일", "월", "화", "수", "목", "금", "토"];
const MEMBERS = [
  { id: "m1", name: "김디자인", color: "#DC2626" },
  { id: "m2", name: "이브랜드", color: "#2563EB" },
  { id: "m3", name: "박크리에", color: "#16A34A" },
  { id: "m4", name: "최비주얼", color: "#EA580C" },
  { id: "m5", name: "정그래픽", color: "#7C3AED" },
  { id: "m6", name: "한모션", color: "#DB2777" },
  { id: "m7", name: "윤컨셉", color: "#0D9488" },
];

const HOLS = ["2026-01-01","2026-01-29","2026-01-30","2026-01-31","2026-03-01","2026-03-02","2026-05-01","2026-05-05","2026-05-24","2026-06-06","2026-08-15","2026-09-24","2026-09-25","2026-09-26","2026-10-03","2026-10-09","2026-12-25"];

function pad(n) { return String(n).padStart(2, "0"); }
function makeDate(y, m, d) { return y + "-" + pad(m) + "-" + pad(d); }
function getToday() { const t = new Date(); return makeDate(t.getFullYear(), t.getMonth() + 1, t.getDate()); }
function parseD(s) { const p = (s || "2026-01-01").split("-"); return { y: +p[0], m: +p[1], d: +p[2] }; }
function addDays(s, n) { const p = parseD(s); const x = new Date(p.y, p.m - 1, p.d + n); return makeDate(x.getFullYear(), x.getMonth() + 1, x.getDate()); }
function dayOfWeek(s) { const p = parseD(s); return new Date(p.y, p.m - 1, p.d).getDay(); }
function daysDiff(a, b) { const pa = parseD(a); const pb = parseD(b); return Math.round((new Date(pb.y, pb.m - 1, pb.d) - new Date(pa.y, pa.m - 1, pa.d)) / 86400000); }
function isOffDay(s) { const d = dayOfWeek(s); return d === 0 || d === 6 || HOLS.indexOf(s) >= 0; }
function calcStart(openDate, md) {
  let need = Math.ceil(md);
  let cur = openDate;
  for (let i = 0; i < 500 && need > 0; i++) {
    cur = addDays(cur, -1);
    if (!isOffDay(cur)) need--;
  }
  return cur;
}
function shortDate(s) { const p = parseD(s); return p.m + "/" + p.d; }
function fullDate(s) { return (s || "").replace(/-/g, "."); }
function getMonday(s) {
  const p = parseD(s);
  const x = new Date(p.y, p.m - 1, p.d);
  const d = x.getDay();
  x.setDate(x.getDate() - d + (d === 0 ? -6 : 1));
  return makeDate(x.getFullYear(), x.getMonth() + 1, x.getDate());
}

let counter = 0;
function newId() { return "proj_" + (++counter); }

function App() {
  const [projects, setProjects] = useState([]);
  const [creating, setCreating] = useState(false);
  const [showMemDlg, setShowMemDlg] = useState(false);
  const [members, setMembers] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [view, setView] = useState("calendar");
  const [year, setYear] = useState(new Date().getFullYear());
  const [month, setMonth] = useState(new Date().getMonth() + 1);
  const [weekMon, setWeekMon] = useState(getMonday(getToday()));
  const [sTab, setSTab] = useState("project");
  const [visMem, setVisMem] = useState([]);
  const [drag, setDrag] = useState(null);
  const [dragDelta, setDragDelta] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [memos, setMemos] = useState([]);
  const [dayAction, setDayAction] = useState(null);
  const [memoEdit, setMemoEdit] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const ADMIN_PW = "123456";

  // ── Load from persistent storage on mount ──
  useState(function () {
    (function loadData() {
      try {
        cloudLoad().then(function (cloudData) {
          var data = cloudData;
          if (!data) { try { var local = localStorage.getItem("bx-scheduler-data"); if (local) data = JSON.parse(local); } catch(e) {} }
          if (data) {
            if (data.members && data.members.length > 0) setMembers(data.members);
            if (data.projects && data.projects.length > 0) setProjects(data.projects);
            if (data.visMem) setVisMem(data.visMem);
            if (data.memos) setMemos(data.memos);
          }
          setLoaded(true);
        }).catch(function () { setLoaded(true); });
      } catch (e) { setLoaded(true); }
    })();
  });

  // ── Save to persistent storage whenever data changes ──
  function saveData(newProjects, newMembers, newVisMem, newMemos) {
    try {
      var data = JSON.stringify({
        projects: newProjects || projects,
        members: newMembers || members,
        visMem: newVisMem || visMem,
        memos: newMemos || memos,
      });
      localStorage.setItem("bx-scheduler-data", data);
      cloudSave(JSON.parse(data));
    } catch (e) {}
  }

  // Wrap setters to auto-save
  function updateProjects(fn) {
    setProjects(function (prev) {
      var next = typeof fn === "function" ? fn(prev) : fn;
      setTimeout(function () { saveData(next, null, null, null); }, 0);
      return next;
    });
  }
  function updateMembers(fn) {
    setMembers(function (prev) {
      var next = typeof fn === "function" ? fn(prev) : fn;
      setTimeout(function () { saveData(null, next, null, null); }, 0);
      return next;
    });
  }
  function updateVisMem(fn) {
    setVisMem(function (prev) {
      var next = typeof fn === "function" ? fn(prev) : fn;
      setTimeout(function () { saveData(null, null, next, null); }, 0);
      return next;
    });
  }
  function updateMemos(fn) {
    setMemos(function (prev) {
      var next = typeof fn === "function" ? fn(prev) : fn;
      setTimeout(function () { saveData(null, null, null, next); }, 0);
      return next;
    });
  }

  function onDragStart(e, projId, origOpen, barEl) {
    var rect = barEl.closest("[data-calwrap]");
    if (!rect) return;
    var colW = rect.getBoundingClientRect().width / 7;
    setDrag({ id: projId, origOpen: origOpen, startX: e.clientX, colW: colW });
    setDragDelta(0);
  }

  function onDragMove(e) {
    if (!drag) return;
    var dx = e.clientX - drag.startX;
    var daysDelta = Math.round(dx / drag.colW);
    setDragDelta(daysDelta);
  }

  function onDragEnd() {
    if (!drag) return;
    if (dragDelta !== 0) {
      updateProjects(function (prev) {
        return prev.map(function (p) {
          if (p.id !== drag.id) return p;
          return Object.assign({}, p, { 
            dueDate: addDays(p.dueDate || p.openDate, dragDelta),
            openDate: addDays(p.openDate, dragDelta)
          });
        });
      });
    }
    setDrag(null);
    setDragDelta(0);
  }

  function toggleMem(mid) {
    updateVisMem(function(prev) {
      var idx = prev.indexOf(mid);
      if (idx >= 0) {
        if (prev.length <= 1) return prev;
        return prev.filter(function(x){return x !== mid;});
      }
      return prev.concat([mid]);
    });
  }

  // Compute enriched data inline (no useMemo to avoid any issues)
  const today = getToday();
  const enriched = projects.map(function (p) {
    var g = GRADES[p.grade] || GRADES.B;
    var due = p.dueDate || p.openDate;
    var startStr = calcStart(due, p.md);
    var status = "예정";
    if (today > due) status = "완료";
    else if (today >= startStr) status = "진행";
    return { id: p.id, name: p.name, grade: p.grade, md: p.md, openDate: p.openDate, dueDate: due, members: p.members || [], changes: p.changes || [], startStr: startStr, gc: g.color, status: status };
  });

  // Filter by visible members when in member mode
  var displayData = sTab === "member" ? enriched.filter(function(e) {
    return e.members.some(function(pm) { return visMem.indexOf(pm.mid) >= 0; });
  }) : enriched;

  var selectedProj = selectedId !== null ? enriched.find(function (e) { return e.id === selectedId; }) : null;

  function navigate(dir) {
    if (view === "week") {
      setWeekMon(addDays(weekMon, dir * 7));
    } else {
      var nm = month + dir;
      var ny = year;
      if (nm < 1) { nm = 12; ny--; }
      if (nm > 12) { nm = 1; ny++; }
      setMonth(nm);
      setYear(ny);
    }
  }

  function goToday() {
    var t = new Date();
    setYear(t.getFullYear());
    setMonth(t.getMonth() + 1);
    setWeekMon(getMonday(getToday()));
  }

  var titleText = view === "week"
    ? fullDate(weekMon) + " ~ " + fullDate(addDays(weekMon, 6))
    : year + "년 " + month + "월";

  // Calendar cells
  var calCells = [];
  if (view === "calendar") {
    var firstDow = new Date(year, month - 1, 1).getDay();
    var daysInMonth = new Date(year, month, 0).getDate();
    var prevMonthDays = new Date(year, month - 1, 0).getDate();
    var prevM = month === 1 ? 12 : month - 1;
    var prevY = month === 1 ? year - 1 : year;
    for (var i = 0; i < firstDow; i++) {
      calCells.push({ str: makeDate(prevY, prevM, prevMonthDays - firstDow + 1 + i), out: true });
    }
    for (var d = 1; d <= daysInMonth; d++) {
      calCells.push({ str: makeDate(year, month, d), out: false });
    }
    var nextM = month === 12 ? 1 : month + 1;
    var nextY = month === 12 ? year + 1 : year;
    while (calCells.length < 42) {
      calCells.push({ str: makeDate(nextY, nextM, calCells.length - firstDow - daysInMonth + 1), out: true });
    }
  }

  var calWeeks = [];
  for (var w = 0; w < 6; w++) calWeeks.push(calCells.slice(w * 7, w * 7 + 7));
  var visibleWeeks = calWeeks.filter(function (wk, i) { return i < 5 || wk.some(function (c) { return !c.out; }); });

  // Gantt dates
  var ganttStart = view === "week" ? weekMon : makeDate(year, month, 1);
  var ganttDays = view === "week" ? 7 : new Date(year, month, 0).getDate();
  var ganttEnd = addDays(ganttStart, ganttDays - 1);
  var ganttDates = [];
  for (var gi = 0; gi < ganttDays; gi++) ganttDates.push(addDays(ganttStart, gi));

  // Filter projects visible in the gantt range
  var ganttData = displayData.filter(function (e) {
    var workOverlap = e.startStr <= ganttEnd && e.dueDate >= ganttStart;
    var openInRange = e.openDate >= ganttStart && e.openDate <= ganttEnd;
    return workOverlap || openInRange;
  });

  function barsForWeek(wk) {
    var ws = wk[0].str;
    var we = wk[6].str;
    var rows = [];
    for (var ei = 0; ei < displayData.length; ei++) {
      var e = displayData[ei];
      var workInWeek = !(e.dueDate < ws || e.startStr > we);
      var openInWeek = e.openDate >= ws && e.openDate <= we;
      if (!workInWeek && !openInWeek) continue;
      // Build segments: consecutive working days only
      var segs = [];
      var segStart = -1;
      for (var ci = 0; ci <= 6; ci++) {
        var dayStr = wk[ci].str;
        var inRange = dayStr >= e.startStr && dayStr <= e.dueDate;
        var isWork = inRange && !isOffDay(dayStr);
        if (isWork) {
          if (segStart < 0) segStart = ci;
        } else {
          if (segStart >= 0) {
            segs.push({ cs: segStart, ce: ci - 1 });
            segStart = -1;
          }
        }
      }
      if (segStart >= 0) segs.push({ cs: segStart, ce: 6 });

      // openDate column
      var openCol = -1;
      if (e.openDate >= ws && e.openDate <= we) {
        openCol = daysDiff(ws, e.openDate);
      }
      if (segs.length > 0 || openCol >= 0) {
        rows.push({
          e: e,
          segs: segs,
          openCol: openCol,
          isFirst: e.startStr >= ws,
          hasDue: e.dueDate >= ws && e.dueDate <= we,
        });
      }
    }
    rows.sort(function (a, b) { var ac = a.segs.length > 0 ? a.segs[0].cs : a.openCol; var bc = b.segs.length > 0 ? b.segs[0].cs : b.openCol; return ac - bc; });
    return rows;
  }

  // Member grouped
  var memberGrouped = null;
  var ganttMemberGrouped = null;
  if (sTab === "member") {
    var gradeOrder = { S: 0, A: 1, B: 2, C: 3, D: 4, E: 5 };
    memberGrouped = members.filter(function(m) { return visMem.indexOf(m.id) >= 0; }).map(function (m) {
      var items = enriched.filter(function (e) { return e.members.some(function (pm) { return pm.mid === m.id; }); });
      items.sort(function (a, b) { return (gradeOrder[a.grade] || 9) - (gradeOrder[b.grade] || 9); });
      return { member: m, items: items };
    }).filter(function (g) { return g.items.length > 0; });
    ganttMemberGrouped = members.filter(function(m) { return visMem.indexOf(m.id) >= 0; }).map(function (m) {
      var items = ganttData.filter(function (e) { return e.members.some(function (pm) { return pm.mid === m.id; }); });
      items.sort(function (a, b) { return (gradeOrder[a.grade] || 9) - (gradeOrder[b.grade] || 9); });
      return { member: m, items: items };
    }).filter(function (g) { return g.items.length > 0; });
  }

  // Stats
  var gradeCounts = {};
  Object.keys(GRADES).forEach(function (g) { gradeCounts[g] = 0; });
  enriched.forEach(function (e) { gradeCounts[e.grade]++; });
  var inProgress = enriched.filter(function (e) { return e.status === "진행"; }).length;
  var completed = enriched.filter(function (e) { return e.status === "완료"; }).length;

  return (
    <div style={{ fontFamily: "'Pretendard',sans-serif", background: "#F5F6F8", color: "#1A1D23", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <style>{`@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');*{box-sizing:border-box;margin:0;padding:0}button{cursor:pointer;border:none;outline:none;font-family:inherit}input{background:#fff;border:1px solid #E5E7EB;color:#1A1D23;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;font-family:inherit}input:focus{border-color:#2563EB}::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}`}</style>

      {!loaded && <div style={{ position: "fixed", inset: 0, background: "#F5F6F8", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8 }}>
        <div style={{ width: 34, height: 34, borderRadius: 9, background: "linear-gradient(135deg,#2563EB,#7C3AED)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 13, color: "#fff" }}>BX</div>
        <div style={{ fontSize: 12, color: "#6B7280" }}>데이터 불러오는 중...</div>
      </div>}

      {/* HEADER */}
      <div style={{ padding: "10px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #E5E7EB", background: "#fff", flexWrap: "wrap", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 9, background: "linear-gradient(135deg,#2563EB,#7C3AED)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 13, color: "#fff" }}>BX</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 15 }}>프로모션 스케줄러</div>
            <div style={{ fontSize: 10, color: "#6B7280" }}>BX Design Team</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {isAdmin ? <>
            <button onClick={function () { setIsAdmin(false); }} style={{ padding: "6px 10px", borderRadius: 8, fontSize: 10, fontWeight: 600, background: "#DCFCE7", color: "#16A34A", border: "1px solid #86EFAC" }}>🔓 관리자</button>
            <button onClick={function () { setShowMemDlg(true); }} style={{ background: "#F5F6F8", padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, border: "1px solid #E5E7EB" }}>👥 구성원</button>
            <button onClick={function () { setCreating(true); }} style={{ background: "linear-gradient(135deg,#2563EB,#7C3AED)", color: "#fff", padding: "8px 18px", borderRadius: 8, fontSize: 12, fontWeight: 700 }}>+ 프로젝트</button>
          </> : <button onClick={function () { setShowLogin(true); }} style={{ padding: "6px 12px", borderRadius: 8, fontSize: 10, fontWeight: 600, background: "#F5F6F8", color: "#6B7280", border: "1px solid #E5E7EB" }}>🔒 관리자 로그인</button>}
        </div>
      </div>

      {/* STATS PANEL */}
      <div style={{ background: "#fff", borderBottom: "1px solid #E5E7EB" }}>
        <div style={{ padding: "6px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", gap: 4 }}>
            {[{k:"project",l:"📊 프로젝트별"},{k:"member",l:"👤 담당자별"}].map(function (t) {
              return <button key={t.k} onClick={function () { setSTab(t.k); }} style={{ padding: "4px 12px", borderRadius: 5, fontSize: 10, fontWeight: 600, background: sTab === t.k ? "#EFF6FF" : "#F5F6F8", color: sTab === t.k ? "#2563EB" : "#6B7280", border: "1px solid " + (sTab === t.k ? "#93C5FD" : "#E5E7EB") }}>{t.l}</button>;
            })}
          </div>
        </div>
        <div style={{ padding: "4px 20px 10px", overflow: "auto" }}>
          {sTab === "project" ? (
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              {Object.keys(GRADES).map(function (g) {
                return <span key={g} style={{ display: "flex", alignItems: "center", gap: 2 }}>
                  <span style={{ width: 18, height: 18, borderRadius: 5, background: GRADES[g].color, display: "inline-flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 8, color: "#fff" }}>{g}</span>
                  <span style={{ fontSize: 10, color: "#6B7280" }}>{gradeCounts[g]}</span>
                </span>;
              })}
              <div style={{ height: 14, width: 1, background: "#E5E7EB" }} />
              <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: "#DBEAFE", color: "#2563EB", fontWeight: 700 }}>진행 {inProgress}</span>
              <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: "#DCFCE7", color: "#16A34A", fontWeight: 700 }}>완료 {completed}</span>
              <span style={{ fontSize: 10, color: "#9CA3AF" }}>전체 {projects.length}건</span>
            </div>
          ) : (
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {members.map(function (m) {
                var isOn = visMem.indexOf(m.id) >= 0;
                var myProjs = enriched.filter(function (e) { return e.members.some(function (pm) { return pm.mid === m.id; }); });
                var myIp = myProjs.filter(function (e) { return e.status === "진행"; }).length;
                var myDone = myProjs.filter(function (e) { return e.status === "완료"; }).length;
                var myGc = {};
                Object.keys(GRADES).forEach(function (g) { myGc[g] = 0; });
                myProjs.forEach(function (e) { myGc[e.grade]++; });
                return (
                  <div key={m.id} onClick={function () { toggleMem(m.id); }} style={{ background: isOn ? "#fff" : "#F9FAFB", border: isOn ? "2px solid " + m.color : "1px solid #E5E7EB", borderRadius: 8, padding: "6px 10px", minWidth: 140, fontSize: 10, cursor: "pointer", opacity: isOn ? 1 : 0.4, transition: "all .15s" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 3 }}>
                      <span style={{ width: 10, height: 10, borderRadius: "50%", background: m.color, border: isOn ? "none" : "2px solid #D1D5DB" }} />
                      <span style={{ fontWeight: 700, fontSize: 11, color: isOn ? m.color : "#9CA3AF" }}>{m.name}</span>
                      <span style={{ fontSize: 9, fontWeight: 700, marginLeft: "auto", padding: "1px 5px", borderRadius: 3, background: isOn ? m.color + "15" : "#F3F4F6", color: isOn ? m.color : "#9CA3AF" }}>{isOn ? "ON" : "OFF"}</span>
                    </div>
                    <div style={{ display: "flex", gap: 3, marginBottom: 2 }}>
                      {Object.keys(GRADES).map(function (g) {
                        return myGc[g] > 0 ? <span key={g} style={{ fontSize: 9, color: GRADES[g].color, fontWeight: 700 }}>{g}:{myGc[g]}</span> : null;
                      })}
                    </div>
                    <div style={{ display: "flex", gap: 4 }}>
                      <span style={{ padding: "1px 5px", borderRadius: 3, background: "#DBEAFE", color: "#2563EB", fontWeight: 700, fontSize: 9 }}>진행 {myIp}</span>
                      <span style={{ padding: "1px 5px", borderRadius: 3, background: "#DCFCE7", color: "#16A34A", fontWeight: 700, fontSize: 9 }}>완료 {myDone}</span>
                      <span style={{ fontSize: 9, color: "#9CA3AF" }}>총{myProjs.length}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* TOOLBAR */}
      <div style={{ padding: "8px 20px", background: "#fff", borderBottom: "1px solid #E5E7EB", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 6 }}>
        <div style={{ display: "flex", gap: 3 }}>
          {[{ k: "week", l: "☰ 주간" }, { k: "month", l: "▤ 월간" }, { k: "calendar", l: "▦ 캘린더" }].map(function (v) {
            return <button key={v.k} onClick={function () { setView(v.k); }} style={{ padding: "5px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600, background: view === v.k ? "#2563EB" : "#F5F6F8", color: view === v.k ? "#fff" : "#6B7280" }}>{v.l}</button>;
          })}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <button onClick={function () { navigate(-1); }} style={{ background: "#F5F6F8", padding: "5px 9px", borderRadius: 6, border: "1px solid #E5E7EB" }}>◀</button>
          <button onClick={goToday} style={{ background: "#F5F6F8", padding: "5px 10px", borderRadius: 6, fontSize: 10, fontWeight: 600, border: "1px solid #E5E7EB" }}>오늘</button>
          <span style={{ fontSize: 13, fontWeight: 700, minWidth: 150, textAlign: "center" }}>{titleText}</span>
          <button onClick={function () { navigate(1); }} style={{ background: "#F5F6F8", padding: "5px 9px", borderRadius: 6, border: "1px solid #E5E7EB" }}>▶</button>
        </div>
      </div>

      {/* === VIEWS === */}
      {view === "calendar" ? (
        /* CALENDAR GRID */
        <div data-calwrap="1" onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerLeave={onDragEnd} style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "auto", padding: "10px 14px", userSelect: drag ? "none" : "auto" }}>
          {/* Drag indicator */}
          {drag && <div style={{ padding: "4px 16px", background: "#EFF6FF", borderRadius: 6, fontSize: 11, fontWeight: 600, color: "#2563EB", flexShrink: 0, textAlign: "center" }}>
            {dragDelta === 0 ? "↔ 좌우로 드래그하여 일정 이동" : (dragDelta > 0 ? "→ " + dragDelta + "일 뒤로" : "← " + Math.abs(dragDelta) + "일 앞으로") + " → 완료일: " + fullDate(addDays(drag.origOpen, dragDelta))}
          </div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", flexShrink: 0 }}>
            {DN.map(function (n, i) { return <div key={n} style={{ textAlign: "center", padding: "8px 0", fontSize: 11, fontWeight: 700, color: i === 0 ? "#DC2626" : i === 6 ? "#2563EB" : "#6B7280", borderBottom: "2px solid #E5E7EB" }}>{n}</div>; })}
          </div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
            {visibleWeeks.map(function (wk, wi) {
              var bars = barsForWeek(wk);
              return (
                <div key={wi} style={{ flex: 1, minHeight: Math.max(120, bars.length * 26 + 44), display: "flex", flexDirection: "column", borderBottom: "1px solid #F0F1F3" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", flexShrink: 0 }}>
                    {wk.map(function (cell, ci) {
                      var isT = cell.str === today;
                      var dd = parseD(cell.str).d;
                      var dw2 = dayOfWeek(cell.str);
                      var isOpen = displayData.some(function (e) { return e.openDate === cell.str; }) && !cell.out;
                      var isDue = displayData.some(function (e) { return e.dueDate === cell.str; }) && !cell.out;
                      var isH = HOLS.indexOf(cell.str) >= 0;
                      var cellMemos = memos.filter(function (m) { return m.date === cell.str; });
                      return (
                        <div key={ci} onClick={function () { if (!cell.out) setDayAction(cell.str); }} style={{ padding: "4px 6px 2px", textAlign: "right", cursor: cell.out ? "default" : "pointer", background: cell.out ? "#FAFAFA" : isT ? "#EFF6FF" : (dw2 === 0 || dw2 === 6 || isH) ? "#FAFAFA" : "#fff", borderRight: ci < 6 ? "1px solid #F0F1F3" : "none", opacity: cell.out ? 0.3 : 1 }}>
                          {isT
                            ? <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 26, height: 26, borderRadius: 13, background: "#2563EB", fontSize: 11, fontWeight: 800, color: "#fff" }}>{dd}</span>
                            : <span style={{ fontSize: 13, fontWeight: (isOpen || isDue) ? 800 : 500, color: isDue ? "#16A34A" : isOpen ? "#EA580C" : isH ? "#DC2626" : dw2 === 0 ? "#DC262688" : dw2 === 6 ? "#2563EB88" : "#9CA3AF" }}>
                                {dd}
                                {isDue && <span style={{ display: "inline-block", width: 5, height: 5, borderRadius: 3, background: "#16A34A", marginLeft: 2, verticalAlign: "super" }} />}
                                {isOpen && !isDue && <span style={{ display: "inline-block", width: 5, height: 5, borderRadius: 3, background: "#EA580C", marginLeft: 2, verticalAlign: "super" }} />}
                                {isH && !isDue && !isOpen && <span style={{ fontSize: 7, color: "#DC2626", marginLeft: 1 }}>휴</span>}
                              </span>
                          }
                          {cellMemos.length > 0 && <div style={{ textAlign: "left", marginTop: 2 }}>
                            {cellMemos.slice(0, 2).map(function (memo) {
                              return <div key={memo.id} onClick={function (ev) { ev.stopPropagation(); setMemoEdit(memo); }} style={{ fontSize: 9, padding: "1px 4px", marginBottom: 1, borderRadius: 3, background: (memo.color || "#6B7280") + "15", color: memo.color || "#6B7280", fontWeight: memo.bold ? 700 : 400, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "pointer", borderLeft: "2px solid " + (memo.color || "#6B7280") }}>{memo.text}</div>;
                            })}
                            {cellMemos.length > 2 && <div style={{ fontSize: 8, color: "#9CA3AF" }}>+{cellMemos.length - 2}개</div>}
                          </div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ flex: 1, padding: "3px 0 4px", position: "relative" }}>
                    {bars.map(function (bar, bi) {
                      var e = bar.e;
                      var mm = e.members.length > 0 ? members.find(function (m) { return m.id === e.members[0].mid; }) : null;
                      var bc = mm ? mm.color : e.gc;
                      var isDragging = drag && drag.id === e.id;
                      var shiftPct = isDragging ? (dragDelta / 7 * 100) : 0;
                      return (
                        <div key={e.id + "_" + wi} style={{ height: 24, marginBottom: 2, position: "relative" }}>
                          {/* Work segments */}
                          {bar.segs.map(function (seg, si) {
                            var leftPct = (seg.cs / 7 * 100) + shiftPct;
                            var widthPct = (seg.ce - seg.cs + 1) / 7 * 100;
                            var isFirstSeg = si === 0 && bar.isFirst;
                            var isLastSeg = si === bar.segs.length - 1 && bar.hasDue;
                            return (
                              <div key={si}
                                onPointerDown={function (ev) { if (!isAdmin) return; ev.preventDefault(); onDragStart(ev, e.id, e.dueDate, ev.currentTarget); }}
                                onClick={function () { if (!drag || dragDelta === 0) setSelectedId(e.id); }}
                                style={{
                                  position: "absolute", top: 0, left: leftPct + "%", width: widthPct + "%", height: 24,
                                  borderRadius: 5,
                                  background: isDragging ? bc + "30" : bc + "18",
                                  borderLeft: isFirstSeg ? "3px solid " + bc : "1.5px solid " + bc + "66",
                                  borderTop: "1px solid " + bc + "22", borderBottom: "1px solid " + bc + "22",
                                  borderRight: isLastSeg ? "3px solid " + bc : "1.5px solid " + bc + "66",
                                  display: "flex", alignItems: "center", padding: "0 4px",
                                  cursor: isDragging ? "grabbing" : "grab",
                                  overflow: "hidden", whiteSpace: "nowrap",
                                  boxShadow: isDragging ? "0 4px 12px rgba(0,0,0,.15)" : "none",
                                  zIndex: isDragging ? 20 : 1,
                                  transition: isDragging ? "none" : "left .15s",
                                  touchAction: "none",
                                }}>
                                {si === 0 && <>
                                  {mm && <><span style={{ width: 6, height: 6, borderRadius: "50%", background: bc, flexShrink: 0, marginRight: 2 }} /><span style={{ fontSize: 9, fontWeight: 700, color: bc, marginRight: 2, flexShrink: 0 }}>{mm.name}</span></>}
                                  <span style={{ width: 14, height: 14, borderRadius: 3, background: e.gc, display: "inline-flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 7, color: "#fff", flexShrink: 0, marginRight: 2 }}>{e.grade}</span>
                                  <span style={{ fontSize: 10, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", flex: 1 }}>{e.name}</span>
                                  <span style={{ fontSize: 8, color: "#9CA3AF", marginLeft: 2, flexShrink: 0 }}>{e.md}MD</span>
                                </>}
                                {isLastSeg && <span style={{ fontSize: 7, fontWeight: 800, background: "#16A34A", color: "#fff", padding: "1px 3px", borderRadius: 3, marginLeft: "auto", flexShrink: 0 }}>완료</span>}
                              </div>
                            );
                          })}
                          {/* Open date marker */}
                          {bar.openCol >= 0 && (function () {
                            var oLeft = (bar.openCol / 7 * 100) + shiftPct;
                            return (
                              <div onClick={function () { setSelectedId(e.id); }} style={{
                                position: "absolute", top: 0, left: oLeft + "%", width: "auto", maxWidth: ((7 - bar.openCol) / 7 * 100) + "%", height: 24,
                                display: "flex", alignItems: "center", gap: 3, padding: "0 5px", cursor: "pointer", zIndex: 2,
                                background: e.gc + "14", borderRadius: 5, border: "1.5px solid " + e.gc + "44",
                              }}>
                                <span style={{ fontSize: 7, fontWeight: 800, background: e.gc, color: "#fff", padding: "2px 5px", borderRadius: 4, flexShrink: 0 }}>OPEN</span>
                                <span style={{ fontSize: 9, fontWeight: 700, color: e.gc, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.name}</span>
                              </div>
                            );
                          })()}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ) : (
        /* GANTT (WEEK / MONTH) */
        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          {/* Sidebar */}
          <div style={{ width: 260, minWidth: 260, borderRight: "1px solid #E5E7EB", overflow: "auto", background: "#fff" }}>
            {/* Mini calendar */}
            <div style={{ padding: "8px 12px", borderBottom: "1px solid #E5E7EB" }}>
              <div style={{ fontWeight: 700, fontSize: 11, marginBottom: 4, textAlign: "center", color: "#6B7280" }}>{year}.{pad(month)}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 1, textAlign: "center" }}>
                {DN.map(function (n) { return <div key={n} style={{ fontSize: 8, color: "#9CA3AF" }}>{n}</div>; })}
                {(function () {
                  var fd = new Date(year, month - 1, 1).getDay();
                  var dim = new Date(year, month, 0).getDate();
                  var cells = [];
                  for (var i = 0; i < fd; i++) cells.push(<div key={"e" + i} />);
                  for (var d = 1; d <= dim; d++) {
                    var ds = makeDate(year, month, d);
                    var isT = ds === today;
                    cells.push(<div key={d} style={{ fontSize: 10, padding: 2, fontWeight: isT ? 800 : 400, color: isT ? "#fff" : "#6B7280", background: isT ? "#2563EB" : "transparent", borderRadius: isT ? 8 : 0 }}>{d}</div>);
                  }
                  return cells;
                })()}
              </div>
            </div>
            {/* Project list */}
            <div style={{ padding: "6px 0" }}>
              <div style={{ padding: "6px 14px", fontSize: 10, fontWeight: 700, color: "#9CA3AF" }}>프로젝트 ({ganttData.length})</div>
              {sTab === "member" && ganttMemberGrouped ? ganttMemberGrouped.map(function (g) {
                return (
                  <div key={g.member.id}>
                    <div style={{ padding: "6px 14px", background: "#F9FAFB", display: "flex", alignItems: "center", gap: 5, borderBottom: "1px solid #F0F1F3" }}>
                      <span style={{ width: 10, height: 10, borderRadius: "50%", background: g.member.color }} /><span style={{ fontWeight: 700, fontSize: 12 }}>{g.member.name}</span><span style={{ fontSize: 10, color: "#9CA3AF", marginLeft: "auto" }}>{g.items.length}</span>
                    </div>
                    {g.items.map(function (e) { return <SidebarItem key={e.id} e={e} members={members} onClick={function () { setSelectedId(e.id); }} />; })}
                  </div>
                );
              }) : ganttData.map(function (e) { return <SidebarItem key={e.id} e={e} members={members} onClick={function () { setSelectedId(e.id); }} />; })}
              {ganttData.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "#9CA3AF", fontSize: 11 }}>프로젝트 없음</div>}
            </div>
          </div>
          {/* Timeline */}
          <div style={{ flex: 1, overflow: "auto" }}>
            <div style={{ display: "flex", position: "sticky", top: 0, zIndex: 10, background: "#fff" }}>
              {ganttDates.map(function (ds, i) {
                var isT = ds === today;
                var we = dayOfWeek(ds) === 0 || dayOfWeek(ds) === 6;
                var isH = HOLS.indexOf(ds) >= 0;
                return (
                  <div key={i} style={{ minWidth: view === "week" ? (100 / 7) + "%" : 36, width: view === "week" ? (100 / 7) + "%" : 36, padding: "5px 2px", textAlign: "center", flexShrink: 0, borderRight: "1px solid #F0F1F3", borderBottom: "1px solid #E5E7EB", background: isT ? "#EFF6FF" : (we || isH) ? "#FAFAFA" : "#fff" }}>
                    <div style={{ fontSize: 9, color: isH ? "#DC2626" : we ? "#9CA3AF" : "#6B7280" }}>{DN[dayOfWeek(ds)]}{isH ? " 휴" : ""}</div>
                    <div style={{ fontSize: 11, fontWeight: isT ? 800 : 600, color: isT ? "#2563EB" : (we || isH) ? "#9CA3AF" : "#1A1D23" }}>{parseD(ds).d}</div>
                  </div>
                );
              })}
            </div>
            <div>
              {sTab === "member" && ganttMemberGrouped ? ganttMemberGrouped.map(function (g) {
                return (
                  <div key={g.member.id}>
                    <div style={{ height: 26, display: "flex", alignItems: "center", padding: "0 8px", background: "#F9FAFB", borderBottom: "1px solid #E5E7EB", minWidth: view === "week" ? "100%" : ganttDays * 36 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: g.member.color, marginRight: 4 }} />
                      <span style={{ fontSize: 10, fontWeight: 700, color: g.member.color }}>{g.member.name}</span>
                    </div>
                    {g.items.map(function (e) { return renderGanttBar(e, ganttStart, ganttDays, view, members); })}
                  </div>
                );
              }) : ganttData.map(function (e) { return renderGanttBar(e, ganttStart, ganttDays, view, members); })}
              {ganttData.length === 0 && <div style={{ padding: 50, textAlign: "center", color: "#9CA3AF", fontSize: 12 }}>프로젝트 없음</div>}
            </div>
          </div>
        </div>
      )}

      {/* CREATE MODAL */}
      {creating && <CreateModal members={members} initDate={typeof creating === "string" ? creating : ""} onClose={function () { setCreating(false); }} onCreate={function (p) { updateProjects(function (prev) { return prev.concat([p]); }); setCreating(false); }} />}

      {/* MEMBER MODAL */}
      {showMemDlg && <MemberModal members={members} setMembers={updateMembers} setVisMem={updateVisMem} onClose={function () { setShowMemDlg(false); }} />}

      {/* DETAIL MODAL */}
      {selectedProj && <DetailModal proj={selectedProj} members={members} isAdmin={isAdmin} onClose={function () { setSelectedId(null); }} onUpdate={function (u) { updateProjects(function (prev) { return prev.map(function (p) { return p.id === u.id ? u : p; }); }); }} onDelete={function (id) { updateProjects(function (prev) { return prev.filter(function (p) { return p.id !== id; }); }); setSelectedId(null); }} />}

      {/* DAY ACTION POPUP */}
      {dayAction && <div onClick={function () { setDayAction(null); }} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.15)", zIndex: 90, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div onClick={function (e) { e.stopPropagation(); }} style={{ background: "#fff", borderRadius: 14, padding: 20, width: 280, boxShadow: "0 12px 40px rgba(0,0,0,.12)" }}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{fullDate(dayAction)}</div>
          <div style={{ fontSize: 10, color: "#9CA3AF", marginBottom: 14 }}>{DN[dayOfWeek(dayAction)]}요일</div>
          {isAdmin && <><button onClick={function () { setCreating(dayAction); setDayAction(null); }} style={{ width: "100%", padding: "10px", borderRadius: 8, background: "linear-gradient(135deg,#2563EB,#7C3AED)", color: "#fff", fontWeight: 700, fontSize: 12, marginBottom: 6 }}>📋 프로젝트 생성</button>
          <button onClick={function () { setMemoEdit({ id: "", date: dayAction, text: "", fontSize: 12, color: "#6B7280", bold: false }); setDayAction(null); }} style={{ width: "100%", padding: "10px", borderRadius: 8, background: "#F5F6F8", fontWeight: 600, fontSize: 12, border: "1px solid #E5E7EB" }}>📝 메모 추가</button></>}
          {memos.filter(function (m) { return m.date === dayAction; }).length > 0 && <div style={{ marginTop: 10, borderTop: "1px solid #F0F1F3", paddingTop: 8 }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#9CA3AF", marginBottom: 4 }}>메모</div>
            {memos.filter(function (m) { return m.date === dayAction; }).map(function (memo) {
              return <div key={memo.id} style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 6px", background: "#F9FAFB", borderRadius: 5, marginBottom: 3, fontSize: 10 }}>
                <span style={{ flex: 1, color: memo.color || "#6B7280", fontWeight: memo.bold ? 700 : 400, fontSize: memo.fontSize || 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{memo.text}</span>
                <button onClick={function () { setMemoEdit(memo); setDayAction(null); }} style={{ padding: "2px 5px", borderRadius: 3, fontSize: 8, background: "#EFF6FF", color: "#2563EB" }}>편집</button>
                <button onClick={function () { updateMemos(function (prev) { return prev.filter(function (x) { return x.id !== memo.id; }); }); }} style={{ padding: "2px 5px", borderRadius: 3, fontSize: 8, background: "#FEE2E2", color: "#DC2626" }}>삭제</button>
              </div>;
            })}
          </div>}
        </div>
      </div>}

      {/* MEMO MODAL */}
      {memoEdit && <MemoModal memo={memoEdit} onClose={function () { setMemoEdit(null); }} onSave={function (m) {
        if (m.id) { updateMemos(function (prev) { return prev.map(function (x) { return x.id === m.id ? m : x; }); }); }
        else { updateMemos(function (prev) { return prev.concat([Object.assign({}, m, { id: "memo_" + Date.now() })]); }); }
        setMemoEdit(null);
      }} />}

      {/* LOGIN MODAL */}
      {showLogin && <LoginModal onClose={function () { setShowLogin(false); }} onLogin={function (pw) { if (pw === ADMIN_PW) { setIsAdmin(true); setShowLogin(false); } else { return false; } return true; }} />}
    </div>
  );
}

function SidebarItem({ e, members, onClick }) {
  var mm = e.members.length > 0 ? members.find(function (m) { return m.id === e.members[0].mid; }) : null;
  return (
    <div onClick={onClick} style={{ padding: "8px 14px", borderBottom: "1px solid #F0F1F3", cursor: "pointer" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
        <div style={{ width: 20, height: 20, borderRadius: 5, background: e.gc, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 9, color: "#fff" }}>{e.grade}</div>
        <span style={{ fontWeight: 700, fontSize: 11, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.name}</span>
      </div>
      <div style={{ fontSize: 10, color: "#6B7280", display: "flex", gap: 6 }}>
        {mm && <span style={{ display: "flex", alignItems: "center", gap: 2 }}><span style={{ width: 5, height: 5, borderRadius: "50%", background: mm.color }} />{mm.name}</span>}
        <span>{e.md}MD</span>
        <span style={{ color: "#16A34A" }}>완료{shortDate(e.dueDate)}</span>
        <span style={{ color: "#EA580C" }}>OPEN{shortDate(e.openDate)}</span>
        <span style={{ padding: "1px 4px", borderRadius: 3, fontSize: 8, fontWeight: 700, background: e.status === "진행" ? "#DBEAFE" : e.status === "완료" ? "#DCFCE7" : "#F3F4F6", color: e.status === "진행" ? "#2563EB" : e.status === "완료" ? "#16A34A" : "#9CA3AF" }}>{e.status}</span>
      </div>
    </div>
  );
}

function renderGanttBar(e, ganttStart, ganttDays, view, members) {
  var isW = view === "week";
  var cW = isW ? null : 36;
  var bsd = daysDiff(ganttStart, e.startStr);
  var bed = daysDiff(ganttStart, e.dueDate);
  var cs = Math.max(0, bsd);
  var ce = Math.min(ganttDays, bed + 1);
  var hasBar = ce > 0 && cs < ganttDays;
  var openCol = daysDiff(ganttStart, e.openDate);
  var hasOpen = openCol >= 0 && openCol < ganttDays;
  if (!hasBar && !hasOpen) return null;
  var mm = e.members.length > 0 ? members.find(function (m) { return m.id === e.members[0].mid; }) : null;
  var bc = mm ? mm.color : e.gc;
  return (
    <div key={e.id} style={{ height: 40, position: "relative", borderBottom: "1px solid #F0F1F3", minWidth: isW ? "100%" : ganttDays * cW }}>
      {hasBar && (function () {
